name: cross-library-smoke

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run contract tests
        run: |
          python -m unittest tests/test_template_contracts.py -v

      - name: Check docs manifest drift
        run: |
          python tools/generate_template_docs_manifest.py --check

      - name: Run cross-library smoke matrix
        run: |
          python tools/run_cross_library_smoke_matrix.py

      - name: Upload smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-library-smoke-summary
          path: artifacts/analysis/cross_library_smoke_summary.json
          if-no-files-found: warn
